<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music | aanastudio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#000;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
}

/* Soft Red Glow */
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(circle, rgba(235,22,22,0.3), transparent 70%);
    filter:blur(120px);
    z-index:0;
}

.container{
    position:relative;
    z-index:2;
    text-align:center;
    padding:20px;
}

h1{
    font-size:3rem;
    color:#eb1616;
    margin-bottom:20px;
}

p{
    opacity:0.7;
    margin-bottom:40px;
}

/* Animated Sound Bars */
.equalizer{
    display:flex;
    gap:8px;
    justify-content:center;
    align-items:flex-end;
    height:120px;
}

.bar{
    width:10px;
    background:#eb1616;
    animation:music 1s infinite ease-in-out;
}

.bar:nth-child(1){animation-delay:0s;}
.bar:nth-child(2){animation-delay:0.2s;}
.bar:nth-child(3){animation-delay:0.4s;}
.bar:nth-child(4){animation-delay:0.6s;}
.bar:nth-child(5){animation-delay:0.8s;}

@keyframes music{
    0%,100%{height:20px;}
    50%{height:100px;}
}

.back{
    margin-top:40px;
    display:inline-block;
    padding:10px 25px;
    border:1px solid #eb1616;
    border-radius:30px;
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.back:hover{
    background:#eb1616;
}
</style>
</head>
<body>

<div class="container">
    <h1>Music Production</h1>
    <p>This page is under construction</p>

    <div class="equalizer">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <a href="../index.html" class="back">Back to Home</a>
</div>

</body>
</html>
